site_name: Polydelve
site_description: Prediction market platform for software security events
site_url: https://polydelve.dev
repo_url: https://github.com/JacksonFaulkner/polydelve
repo_name: polydelve

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  custom_dir: docs/overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  logo: assets/logo.png
  favicon: assets/logo.png

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Architecture:
    - Overview: architecture/overview.md
    - Database: architecture/database.md
    - Data Pipeline: architecture/pipeline.md
  - Backend:
    - API Routes: backend/api.md
    - Features: backend/features.md
    - Scripts: backend/scripts.md
  - Frontend:
    - Overview: frontend/overview.md
  - Development:
    - Setup: dev/setup.md
    - Make Commands: dev/make.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [backend]
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
