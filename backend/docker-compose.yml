services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: polydelve_dev
      POSTGRES_USER: polydelve
      POSTGRES_PASSWORD: polydelve
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polydelve -d polydelve_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
